<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">

</head>

<body>
<body class="login-page">
<div class="login-box">

<h2>College Attendance System</h2>

<input 
type="email" 
id="email" 
placeholder="Enter Email"
required
autocomplete="off"
>

<input 
type="password" 
id="password" 
placeholder="Enter Password"
required
autocomplete="off"
>

<p id="error-msg"></p>

<button onclick="login()">Login</button>

</div>

<script src="login.js"></script>

</body>
</html>
